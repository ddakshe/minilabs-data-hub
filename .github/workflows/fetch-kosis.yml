name: Fetch KOSIS stats

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST
  workflow_dispatch:
    inputs:
      reason:
        description: '실행 이유 (로그에만 기록, 선택)'
        required: false
        default: 'manual refresh'

permissions:
  contents: write

concurrency:
  group: fetch-kosis
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show trigger context
        run: |
          echo "Event       : ${{ github.event_name }}"
          echo "Reason      : ${{ github.event.inputs.reason || '(scheduled)' }}"
          date -u "+UTC: %Y-%m-%d %H:%M:%S"
          TZ=Asia/Seoul date "+KST: %Y-%m-%d %H:%M:%S"

      - name: Fetch KOSIS data
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: |
          if [ -z "$KOSIS_API_KEY" ]; then
            echo "::error::KOSIS_API_KEY secret is not set."
            exit 1
          fi
          node scripts/fetch-kosis.js

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- korea-stats/stats.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat korea-stats/stats.json
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DATE_KST=$(TZ=Asia/Seoul date "+%Y-%m-%d")
          TRIGGER="${{ github.event_name }}"
          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            MSG="chore(kosis): manual refresh ($DATE_KST)"
          else
            MSG="chore(kosis): daily refresh ($DATE_KST)"
          fi

          git add korea-stats/stats.json
          git commit -m "$MSG"
          git push

      - name: Summary
        if: always()
        run: |
          {
            echo "## KOSIS Fetch Summary"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Changed: \`${{ steps.diff.outputs.changed || 'n/a' }}\`"
            echo "- KST: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"
          } >> "$GITHUB_STEP_SUMMARY"
