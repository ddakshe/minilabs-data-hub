name: Fetch Holidays

on:
  schedule:
    - cron: '0 22 1 * *'  # 매월 1일 07:00 KST (정부 발표 변경 감지)
  workflow_dispatch:
    inputs:
      reason:
        description: '실행 이유 (로그에만 기록, 선택)'
        required: false
        default: 'manual refresh'

permissions:
  contents: write

concurrency:
  group: fetch-holidays
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Show trigger context
        run: |
          echo "Event       : ${{ github.event_name }}"
          echo "Reason      : ${{ github.event.inputs.reason || '(scheduled)' }}"
          date -u "+UTC: %Y-%m-%d %H:%M:%S"
          TZ=Asia/Seoul date "+KST: %Y-%m-%d %H:%M:%S"

      - name: Fetch holidays
        env:
          KASI_SERVICE_KEY: ${{ secrets.KASI_SERVICE_KEY }}
        run: node scripts/fetch-holidays.mjs

      - name: Check for changes
        id: diff
        run: |
          git add holidays/
          if git diff --cached --quiet -- holidays/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --cached --stat holidays/
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          DATE_KST=$(TZ=Asia/Seoul date "+%Y-%m-%d")
          TRIGGER="${{ github.event_name }}"
          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            MSG="chore(holidays): manual refresh ($DATE_KST)"
          else
            MSG="chore(holidays): refresh ($DATE_KST)"
          fi

          git commit -m "$MSG"
          git push

      - name: Summary
        if: always()
        run: |
          {
            echo "## Holidays Fetch Summary"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Changed: \`${{ steps.diff.outputs.changed || 'n/a' }}\`"
            echo "- KST: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"
          } >> "$GITHUB_STEP_SUMMARY"
