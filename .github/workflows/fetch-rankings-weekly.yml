name: "Fetch Rankings (Weekly)"

on:
  schedule:
    - cron: '0 19 * * 1' # 매주 월요일 19:00 UTC = KST 화요일 04:00
  workflow_dispatch:
    inputs:
      reason:
        description: '실행 이유'
        required: false
        default: 'manual weekly'

permissions:
  contents: write

concurrency:
  group: fetch-rankings
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Show trigger context
        run: |
          echo "Mode        : WEEKLY"
          echo "Event       : ${{ github.event_name }}"
          echo "Reason      : ${{ github.event.inputs.reason || '(scheduled)' }}"
          TZ=Asia/Seoul date "+KST: %Y-%m-%d %H:%M:%S"

      - name: Fetch rankings — cheerio (weekly)
        run: node scripts/fetch-rankings.mjs --weekly || echo "⚠️ cheerio 일부 실패"

      - name: Fetch rankings — Playwright (weekly)
        run: node scripts/fetch-rankings-pw.mjs --weekly || echo "⚠️ Playwright 일부 실패"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- rankings/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat rankings/
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DATE_KST=$(TZ=Asia/Seoul date "+%Y-%m-%d")
          git add rankings/
          git commit -m "chore(rankings): weekly refresh ($DATE_KST)"
          git push

      - name: Summary
        if: always()
        run: |
          {
            echo "## Weekly Rankings Summary"
            echo "- Changed: \`${{ steps.diff.outputs.changed || 'n/a' }}\`"
            echo "- KST: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S')"
          } >> "$GITHUB_STEP_SUMMARY"
