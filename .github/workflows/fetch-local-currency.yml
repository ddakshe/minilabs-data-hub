name: Fetch local currency franchises

on:
  schedule:
    - cron: '0 19 * * *'  # 매일 04:00 KST (UTC 19:00 전날)
  workflow_dispatch:
    inputs:
      reason:
        description: '실행 이유'
        required: false
        default: 'manual refresh'

permissions:
  contents: write

concurrency:
  group: fetch-local-currency
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show trigger context
        run: |
          echo "Event  : ${{ github.event_name }}"
          echo "Reason : ${{ github.event.inputs.reason || '(scheduled)' }}"
          TZ=Asia/Seoul date "+KST: %Y-%m-%d %H:%M:%S"

      - name: Fetch franchise data
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: node scripts/fetch-local-currency.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- local-currency/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat local-currency/
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add local-currency/
          git commit -m "chore: update local currency data $(TZ=Asia/Seoul date '+%Y-%m-%d')"
          git push
